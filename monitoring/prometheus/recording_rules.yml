groups:
- name: codeexec_recording_rules
  rules:
  - record: codeexec:execution_timeout_rate:5m
    expr: rate(codeexec_execution_timeouts_total[5m]) / rate(codeexec_submissions_total[5m])

  - record: codeexec:execution_duration_p95:5m
    expr: histogram_quantile(0.95, rate(codeexec_execution_duration_seconds_bucket[5m]))

  - record: codeexec:execution_duration_p99:5m
    expr: histogram_quantile(0.99, rate(codeexec_execution_duration_seconds_bucket[5m]))

  - record: codeexec:submission_pass_rate:5m
    expr: sum(rate(codeexec_submissions_total{status="PASS"}[5m])) / sum(rate(codeexec_submissions_total[5m]))

  - record: codeexec:submission_latency_p95:5m
    expr: histogram_quantile(0.95, rate(codeexec_submission_latency_seconds_bucket[5m]))

  - record: codeexec:error_rate:5m
    expr: sum(rate(codeexec_execution_errors_total[5m])) / sum(rate(codeexec_submissions_total[5m]))

  - record: codeexec:auth_requests:5m
    expr: sum(rate(codeexec_auth_total[5m])) by (type, status)

  - record: codeexec:submissions:5m
    expr: sum(rate(codeexec_submissions_total[5m])) by (status, difficulty)