global:
  scrape_interval: 10s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "alert.rules.yml"
  - "recording_rule.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter-cicd'
    static_configs:
      - targets: ['13.206.121.136:9100']
    scrape_interval: 10s

  - job_name: 'node-exporter-app'
    static_configs:
      - targets: ['13.233.216.240:9100']
    scrape_interval: 10s

  - job_name: 'backend-app'
    static_configs:
      - targets: ['13.233.216.240:4000']
    honor_labels: true
    metrics_path: /metrics
    scrape_interval: 10s