---
- name: Deploy CI/CD Server
  import_playbook: deploy-cicd.yml

- name: Deploy App Server
  import_playbook: deploy-app.yml

- name: Deploy Monitoring Server
  import_playbook: deploy-monitoring.yml

- name: Display deployment summary
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Get all EC2 instances
      amazon.aws.ec2_instance_info:
        region: ap-south-1
        filters:
          instance-state-name: ["running"]
      register: all_ec2_info

    - name: Show deployment summary
      debug:
        msg: |
          ================================================
          CodeExec 3-EC2 Deployment Complete!
          EC2 #1 - CI/CD Server: <IP>
          EC2 #2 - App Server: <IP>
          EC2 #3 - Monitoring Server: <IP>
          ================================================