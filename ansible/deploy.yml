---
# =========================
# 1. PROVISION / REUSE EC2
# =========================
- name: Provision or reuse EC2
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ansible_python_interpreter: /usr/bin/python3
    region: ap-south-1
    instance_type: t3.micro
    ami_id: ami-03f4878755434977f
    key_name: codeexec-key
    security_group_name: codeexec-sg

  tasks:
    - name: Check for existing EC2
      amazon.aws.ec2_instance_info:
        region: "{{ region }}"
        filters:
          "tag:Name": "codeexec-server"
          instance-state-name: ["running"]
      register: ec2_info

    - name: Create security group
      amazon.aws.ec2_security_group:
        name: "{{ security_group_name }}"
        description: CodeExec SG
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports: [22]
            cidr_ip: 0.0.0.0/0
          - proto: tcp
            ports: [4000]
            cidr_ip: 0.0.0.0/0
          - proto: tcp
            ports: [5173]
            cidr_ip: 0.0.0.0/0
        rules_egress:
          - proto: all
            cidr_ip: 0.0.0.0/0

    - name: Launch EC2 if not exists
      amazon.aws.ec2_instance:
        name: codeexec-server
        region: "{{ region }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ ami_id }}"
        key_name: "{{ key_name }}"
        security_groups: ["{{ security_group_name }}"]
        network:
          assign_public_ip: true
        wait: true
        state: running
        tags:
          Name: codeexec-server
      when: ec2_info.instances | length == 0
      register: ec2_new

    - name: Set EC2 IP
      set_fact:
        ec2_ip: >-
          {{
            (ec2_info.instances[0].public_ip_address
            if ec2_info.instances | length > 0
            else ec2_new.instances[0].public_ip_address)
          }}

    - name: Add instance to inventory
      add_host:
        name: "{{ ec2_ip }}"
        groups: codeexec
        ansible_user: ubuntu
        ansible_ssh_private_key_file: /var/jenkins_home/.ssh/codeexec-key.pem
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

    - name: Wait for SSH
      wait_for:
        host: "{{ ec2_ip }}"
        port: 22
        delay: 15
        timeout: 180

    - name: Print EC2 IP
      debug:
        msg: "EC2 IP: {{ ec2_ip }}"

# =========================
# 2. DEPLOY APP
# =========================
- name: Setup EC2 and deploy CodeExec
  hosts: codeexec
  become: true

  tasks:
    - name: Update packages
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ubuntu to docker group
      user:
        name: ubuntu
        groups: docker
        append: true

    - name: Install Git
      apt:
        name: git
        state: present

    - name: Clone project
      git:
        repo: https://github.com/nikhil8995/CodeExec.git
        dest: /home/ubuntu/CodeExec
        version: main
        force: yes

    - name: Create network
      command: docker network create codeexec-network
      ignore_errors: true

    - name: Create volume
      command: docker volume create postgres_data
      ignore_errors: true

    - name: Run PostgreSQL
      command: >
        docker run -d --name codeexec-postgres
        --network codeexec-network
        -e POSTGRES_USER=postgres
        -e POSTGRES_PASSWORD=postgres
        -e POSTGRES_DB=codeexec
        -v postgres_data:/var/lib/postgresql/data
        -p 5432:5432 postgres:15
      ignore_errors: true

    - name: Wait for DB
      pause:
        seconds: 10

    - name: Build backend
      command: docker build -t codeexec-backend /home/ubuntu/CodeExec/backend

    - name: Run backend
      command: >
        docker run -d --name codeexec-backend
        --network codeexec-network
        -p 4000:4000
        -e DATABASE_URL=postgresql://postgres:postgres@codeexec-postgres:5432/codeexec
        -e JWT_SECRET=supersecret
        codeexec-backend
      ignore_errors: true

    - name: Run migrations
      command: docker exec codeexec-backend npx prisma migrate deploy
      ignore_errors: true

    - name: Build frontend
      command: >
        docker build --no-cache
        --build-arg VITE_API_URL=http://{{ inventory_hostname }}:4000/api
        -t codeexec-frontend /home/ubuntu/CodeExec/frontend

    - name: Run frontend
      command: >
        docker run -d --name codeexec-frontend
        --network codeexec-network
        -p 5173:5173
        codeexec-frontend
      ignore_errors: true
