---
- name: Deploy CodeExec to 2-EC2 Architecture
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ansible_python_interpreter: /usr/bin/python3
    region: ap-south-1

  tasks:
    - name: Deploy App Server
      ansible.builtin.import_playbook: deploy-app.yml

    - name: Get App Server IP
      amazon.aws.ec2_instance_info:
        region: "{{ region }}"
        filters:
          "tag:Name": "codeexec-app"
          instance-state-name: ["running"]
      register: app_ec2_info

    - name: Deploy Monitoring Server
      ansible.builtin.import_playbook: deploy-monitoring.yml

    - name: Display deployment summary
      debug:
        msg: |
          ================================================
          CodeExec 2-EC2 Deployment Complete!
          ================================================
          App Server (EC2 #1):
            - PostgreSQL: {{ app_ec2_info.instances[0].public_ip_address }}:5432
            - Backend: {{ app_ec2_info.instances[0].public_ip_address }}:4000
            - Frontend: {{ app_ec2_info.instances[0].public_ip_address }}:5173
            - Node Exporter: {{ app_ec2_info.instances[0].public_ip_address }}:9100

          Monitoring Server (EC2 #2):
            - Prometheus: <monitoring-ip>:9090
            - Grafana: <monitoring-ip>:3000
            - Alertmanager: <monitoring-ip>:9093
          ================================================