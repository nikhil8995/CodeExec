---
- name: Deploy CI/CD Server
  hosts: localhost
  gather_facts: true
  tasks:
    - import_playbook: deploy-cicd.yml
    - name: Store CI/CD IP globally
      set_fact:
        global_cicd_ip: "{{ hostvars[groups['cicd_server'][0]]['cicd_ec2_ip'] }}"

- name: Deploy App Server
  hosts: localhost
  gather_facts: true
  tasks:
    - import_playbook: deploy-app.yml
    - name: Store App IP globally
      set_fact:
        global_app_ip: "{{ hostvars[groups['app_server'][0]]['app_ec2_ip'] }}"

- name: Deploy Monitoring Server
  hosts: localhost
  gather_facts: true
  tasks:
    - import_playbook: deploy-monitoring.yml
    - name: Store Monitoring IP globally
      set_fact:
        global_monitoring_ip: "{{ hostvars[groups['monitoring_server'][0]]['mon_ec2_ip'] }}"

- name: Display deployment summary
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Get all EC2 instances
      amazon.aws.ec2_instance_info:
        region: ap-south-1
        filters:
          instance-state-name: ["running"]
      register: all_ec2_info

    - name: Show deployment summary
      debug:
        msg: |
          ================================================
          CodeExec 3-EC2 Deployment Complete!
          EC2 #1 - CI/CD Server: {{ global_cicd_ip | default('N/A') }}
          EC2 #2 - App Server: {{ global_app_ip | default('N/A') }}
          EC2 #3 - Monitoring Server: {{ global_monitoring_ip | default('N/A') }}
          ================================================