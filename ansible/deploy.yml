---
- name: Deploy CodeExec to EC2
  hosts: codeexec_servers
  become: true

  vars:
    app_dir: /home/ubuntu/codeexec

  tasks:
    - name: Install required packages
      apt:
        name:
          - docker.io
          - git
        state: present
        update_cache: yes

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: true

    - name: Clone / Update repo
      git:
        repo: https://github.com/nikhil8995/CodeExec.git
        dest: "{{ app_dir }}"
        version: main
        force: yes

    - name: Stop old containers
      command: docker rm -f codeexec-postgres codeexec-backend codeexec-frontend
      ignore_errors: true

    - name: Create network
      command: docker network create codeexec-network
      ignore_errors: true

    - name: Create volume
      command: docker volume create postgres_data
      ignore_errors: true

    - name: Run PostgreSQL
      command: >
        docker run -d
        --name codeexec-postgres
        --network codeexec-network
        -e POSTGRES_USER=postgres
        -e POSTGRES_PASSWORD=postgres
        -e POSTGRES_DB=codeexec
        -v postgres_data:/var/lib/postgresql/data
        -p 5432:5432
        postgres:15

    - name: Wait for DB
      pause:
        seconds: 10

    - name: Build backend
      command: docker build -t codeexec-backend {{ app_dir }}/backend

    - name: Run backend
      command: >
        docker run -d
        --name codeexec-backend
        --network codeexec-network
        -e DATABASE_URL=postgresql://postgres:postgres@codeexec-postgres:5432/codeexec
        -e JWT_SECRET=supersecret
        -p 4000:4000
        codeexec-backend

    - name: Run migrations
      command: docker exec codeexec-backend npx prisma migrate deploy

    - name: Build frontend
      command: docker build -t codeexec-frontend {{ app_dir }}/frontend

    - name: Run frontend
      command: >
        docker run -d
        --name codeexec-frontend
        --network codeexec-network
        -p 5173:5173
        codeexec-frontend
